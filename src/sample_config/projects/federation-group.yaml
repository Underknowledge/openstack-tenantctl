# Per-entry mode federation example.
#
# Demonstrates mixed modes: some entries use "project" mode (direct project
# assignment in mapping rules), others use "group" mode (Keystone group
# assignment).  The federation-level "mode" sets the default; each entry
# can override it.
#
# In group mode, tenantctl automatically:
#   1. Creates Keystone groups named "{project_name}{separator}{idp_group}"
#   2. Assigns the listed roles to those groups on this project
#   3. Generates mapping rules that place IDP users into the groups
#
# See federation_static_group.json for what the generated
# mapping rules look like.

name: federation-group-demo
resource_prefix: fedgrp
description: "Per-entry mode federation example"

network:
  subnet:
    cidr: 192.168.40.0/24

federation:
  # Default mode for entries that don't specify their own.
  mode: "group"
  # Required for cross-domain federated authentication.
  user_type: "ephemeral"

  role_assignments:
    - idp_group: member
      roles:
        - member
        - load-balancer_member
      # Inherits mode: "group" from the federation-level default.
      # Auto-derived group name: "federation-group-demo member"
    - idp_group: reader
      roles:
        - reader
      # Override the auto-derived name with a shared group.
      # Multiple projects can point to the same Keystone group.
      keystone_group: "shared-readers"
    - idp_group: operator
      roles:
        - admin
      # Override mode for this entry only: direct project assignment.
      mode: "project"
    - idp_group: service-account
      roles:
        - member
      # Combined mode: both direct project roles AND group membership.
      # Useful when application credentials require project-scoped roles
      # alongside group membership.
      mode: ["project", "group"]
